<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/fiscasync-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Liass'Pilot - Application de Génération et Édition de Liasse Fiscale SYSCOHADA/IFRS" />
    <title>Liass'Pilot - Solution Fiscale OHADA</title>

    <!-- ────────── PWA / Intégration poste de travail ──────────
         Le manifest expose name, icônes, shortcuts (épinglage taskbar) et
         le mode standalone. Combiné au service worker /sw.js, il rend
         l'application installable comme une app native sur Windows, macOS,
         Linux, Android et iOS (ajout à l'écran d'accueil).
         display=standalone : fenêtre dédiée sans chrome navigateur.
    -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Theme color (barre de titre fenêtre installée) -->
    <meta name="theme-color" content="#171717" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#171717" media="(prefers-color-scheme: dark)" />

    <!-- iOS / Safari add-to-homescreen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Liass'Pilot" />
    <link rel="apple-touch-icon" href="/fiscasync-icon.svg" />

    <!-- Windows tile (épinglage barre des tâches Edge / Start menu) -->
    <meta name="application-name" content="Liass'Pilot" />
    <meta name="msapplication-TileColor" content="#171717" />
    <meta name="msapplication-tooltip" content="Liass'Pilot — Solution Fiscale OHADA" />

    <!-- Open Graph / Social share (lien d'invitation partagé sur Slack, WhatsApp…) -->
    <meta property="og:title" content="Liass'Pilot — Solution Fiscale OHADA" />
    <meta property="og:description" content="Production, contrôle et télédéclaration de la liasse fiscale SYSCOHADA." />
    <meta property="og:image" content="/screenshots/dashboard.png" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Preconnect to optimize font loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!--
      Polices premium :
      - Dosis (primary UI, Nordic Slate) — 6 fichiers consommateurs
      - Grand Hotel (brand Liass'Pilot) — 7 fichiers
      - JetBrains Mono (chiffres tabulaires, code snippets) — 7 fichiers
      - Inter (fallback humanist) — 92 fichiers
      Polices supprimées du préchargement :
        - Exo 2 (fallback déclaratif suffisant via system stack)
        - Open Sans (1 fichier orphelin)
        - Playfair Display (0 fichier)
        - UnifrakturMaguntia (0 fichier)
        - Material Icons icon-font (icônes consommées en SVG via @mui/icons-material)
      Économie ≈ 200 KB WOFF2 + 1 requête CSS sur le first paint.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Dosis:wght@300;400;500;600;700;800&family=Grand+Hotel&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Service worker : enregistré au load() pour ne pas bloquer le first paint.
         L'échec est silencieux (Safari incognito, iframe sandboxed…) pour ne
         jamais casser l'app si l'environnement refuse les SW. -->
    <script>
      if ('serviceWorker' in navigator) {
        var __isLocalhost =
          location.hostname === 'localhost' ||
          location.hostname === '127.0.0.1' ||
          location.hostname === '::1';

        if (__isLocalhost) {
          // En DEV : on ne veut PAS de service worker. Un SW qui met le shell en
          // cache peut servir une version obsolète et donner l'impression que les
          // modifications n'arrivent jamais. On désenregistre tout SW existant et
          // on purge ses caches pour garantir un rendu toujours frais en local.
          navigator.serviceWorker.getRegistrations()
            .then(function (regs) { regs.forEach(function (r) { r.unregister(); }); })
            .catch(function () {});
          if (window.caches && caches.keys) {
            caches.keys()
              .then(function (keys) { keys.forEach(function (k) { caches.delete(k); }); })
              .catch(function () {});
          }
        } else {
          // En PROD : enregistrement normal (installable + fallback offline).
          window.addEventListener('load', function () {
            navigator.serviceWorker
              .register('/sw.js', { scope: '/' })
              .catch(function (err) {
                console.warn('[PWA] Service worker registration failed:', err);
              });
          });
        }
      }
    </script>
  </body>
</html>
